<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Telur Omega SP-1</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; margin: 0; }
        
        /* Tombol Header & Judul */
        .header-area { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-area h2 { margin: 0; font-size: 18px; color: #333; }
        .btn-sheet {
            text-decoration: none; padding: 8px 12px; background: #1d6f42;
            color: white; border-radius: 5px; font-size: 12px; font-weight: bold;
        }

        .kandang-container { 
            display: flex; flex-direction: column; gap: 15px; 
            overflow-x: auto; /* Biar bisa di-scroll di HP jika kolom terlalu banyak */
            padding-bottom: 10px;
        }
        
        h3 { font-size: 14px; margin-bottom: 5px; color: #666; }

        .row-grid { display: grid; gap: 5px; min-width: 600px; /* Minimal lebar agar tidak gepeng */ }
        .row-15 { grid-template-columns: repeat(15, 1fr); }
        .row-mixed { grid-template-columns: repeat(11, 1fr); }

        .kolom { 
            border: 1px solid #ddd; background: #fff; padding: 5px; 
            display: flex; flex-direction: column; gap: 4px; border-radius: 4px; text-align: center;
        }
        .kolom small { font-size: 8px; color: #999; margin-bottom: 2px; }

        .ayam {
            background: #f0f0f0; border: 1px solid #ccc; padding: 10px 0; cursor: pointer;
            font-size: 10px; border-radius: 3px; transition: 0.3s;
        }
        .ayam.bertelur { background: #ffd700; border-color: #e6c200; font-weight: bold; color: #000; }
        .ayam:disabled { cursor: default; opacity: 0.9; }
        
        button#submit { 
            width: 100%; margin-top: 25px; padding: 18px; background: #28a745; 
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid #28a745;
            border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#555;">Sinkronisasi data Sheets...</p>
    </div>

    <div class="header-area">
        <h2>Omega SP-1</h2>
        <a href="https://docs.google.com/spreadsheets/d/1nFI4BushuLxN9G1TKi_CCP3ZSsafQuOkTB8OvyQbTIk/edit#gid=0" target="_blank" class="btn-sheet">📂 Database</a>
    </div>

    <div class="kandang-container">
        <h3>Baris 1 (15 Kolom)</h3>
        <div id="baris1" class="row-grid row-15"></div>

        <h3>Baris 2 (15 Kolom)</h3>
        <div id="baris2" class="row-grid row-15"></div>

        <h3>Baris 3 (Campuran)</h3>
        <div id="baris3" class="row-grid row-mixed"></div>
    </div>

    <button id="submit" onclick="kirimData()">Simpan Data Hari Ini</button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbysYBc6KHeFTL3q7dATs1qAR-i5CAaPXs-PScOBZOzHwS9lX1ITzlqO5lxAHOwfSuU28g/exec"; 
        let riwayatData = []; 

        function renderKandang() {
            const b1 = document.getElementById('baris1');
            const b2 = document.getElementById('baris2');
            const b3 = document.getElementById('baris3');
            b1.innerHTML = ''; b2.innerHTML = ''; b3.innerHTML = '';

            for(let i=1; i<=15; i++) {
                b1.innerHTML += buatKolom(`B1-K${i}`, 2);
                b2.innerHTML += buatKolom(`B2-K${i}`, 2);
            }
            for(let i=1; i<=11; i++) {
                let jml = (i <= 5) ? 2 : 1;
                b3.innerHTML += buatKolom(`B3-K${i}`, jml);
            }
        }

        function buatKolom(id, jumlah) {
            let buttons = '';
            for(let j=1; j<=jumlah; j++) {
                buttons += `<button class="ayam" onclick="toggleAyam(this)" data-id="${id}-A${j}">A${j}</button>`;
            }
            return `<div class="kolom"><small>${id}</small>${buttons}</div>`;
        }

        async function muatStatusHariIni() {
            const loader = document.getElementById('loader');
            try {
                const response = await fetch(API_URL);
                riwayatData = await response.json();
                const hariIni = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                
                riwayatData.forEach(item => {
                    if (item.tanggal === hariIni) {
                        const btn = document.querySelector(`[data-id="${item.id}"]`);
                        if (btn) {
                            btn.classList.add('bertelur');
                            btn.disabled = true;
                            btn.innerText = "✓";
                        }
                    }
                });
            } catch (e) {
                console.error("Gagal muat data:", e);
            } finally {
                loader.style.display = 'none';
            }
        }

        function toggleAyam(btn) {
            const idAyam = btn.getAttribute('data-id');
            if (btn.disabled) {
                const history = riwayatData
                    .filter(item => item.id === idAyam)
                    .map(item => item.tanggal);
                alert(`Riwayat 7 Hari Terakhir (${idAyam}):\nBertelur pada tanggal: \n${history.join(', ') || 'Belum ada data'}`);
            } else {
                btn.classList.toggle('bertelur');
            }
        }

        async function kirimData() {
            const btnSubmit = document.getElementById('submit');
            const dipilih = document.querySelectorAll('.ayam.bertelur:not(:disabled)');
            
            if (dipilih.length === 0) return alert("Pilih ayam dulu!");
            
            btnSubmit.innerText = "Mengirim...";
            btnSubmit.disabled = true;

            const daftarID = Array.from(dipilih).map(a => a.getAttribute('data-id'));

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(daftarID),
                    mode: 'no-cors'
                });
                alert(`Tercatat ${daftarID.length} telur baru!`);
                location.reload();
            } catch (error) {
                alert("Koneksi bermasalah!");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Simpan Data ke Google Sheets";
            }
        }

        // Inisialisasi Aplikasi
        window.onload = async () => {
            renderKandang();
            await muatStatusHariIni();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        };
    </script>
</body>
</html>
