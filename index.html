<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Telur Omega SP-1</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .kandang-container { display: flex; flex-direction: column; gap: 20px; }
        
        /* Baris 1 & 2: 15 Kolom */
        .row-15 { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 5px; 
        }
        
        /* Baris 3: Campuran */
        .row-mixed { 
            display: grid; 
            grid-template-columns: repeat(11, 1fr); 
            gap: 5px; 
        }

        .kolom { 
            border: 1px solid #ccc; background: #fff; padding: 5px; 
            display: flex; flex-direction: column; gap: 3px; border-radius: 4px;
        }

        .ayam {
            background: #eee; border: none; padding: 8px 0; cursor: pointer;
            font-size: 10px; border-radius: 3px; transition: 0.3s;
        }

        .ayam.bertelur { background: #ffd700; font-weight: bold; }
        
        button#submit { 
            margin-top: 30px; padding: 15px; background: #28a745; 
            color: white; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Visual Kandang Ayam</h2>
    <div class="kandang-container" id="main-kandang">
        <h3>Baris 1 (15 Kolom x 2 Ayam)</h3>
        <div id="baris1" class="row-15"></div>

        <h3>Baris 2 (15 Kolom x 2 Ayam)</h3>
        <div id="baris2" class="row-15"></div>

        <h3>Baris 3 (5x2 Ayam, 6x1 Ayam)</h3>
        <div id="baris3" class="row-mixed"></div>
    </div>

    <button id="submit" onclick="kirimData()">Simpan Data ke Google Sheets</button>

    <script>
// 1. GANTI DENGAN URL BARU SETELAH KAMU RE-DEPLOY APPS SCRIPT
    const API_URL = "https://script.google.com/macros/s/AKfycbysYBc6KHeFTL3q7dATs1qAR-i5CAaPXs-PScOBZOzHwS9lX1ITzlqO5lxAHOwfSuU28g/exec"; 

    // Fungsi Render Kandang (Tetap dipertahankan)
    function renderKandang() {
        const b1 = document.getElementById('baris1');
        const b2 = document.getElementById('baris2');
        const b3 = document.getElementById('baris3');

        b1.innerHTML = ''; b2.innerHTML = ''; b3.innerHTML = ''; // Reset

        for(let i=1; i<=15; i++) {
            b1.innerHTML += buatKolom(`B1-K${i}`, 2);
            b2.innerHTML += buatKolom(`B2-K${i}`, 2);
        }

        for(let i=1; i<=11; i++) {
            let jumlahAyam = (i <= 5) ? 2 : 1;
            b3.innerHTML += buatKolom(`B3-K${i}`, jumlahAyam);
        }
    }

    function buatKolom(id, jumlah) {
        let buttons = '';
        for(let j=1; j<=jumlah; j++) {
            buttons += `<button class="ayam" onclick="toggleAyam(this)" data-id="${id}-A${j}">Ayam ${j}</button>`;
        }
        return `<div class="kolom"><small>${id}</small>${buttons}</div>`;
    }

    function toggleAyam(btn) {
        // Hanya bisa toggle jika belum dikunci (sudah masuk database)
        if (!btn.disabled) {
            btn.classList.toggle('bertelur');
        }
    }

    // --- FITUR BARU: HEATMAP (Point 1) ---
    async function muatStatusHariIni() {
        try {
            const response = await fetch(API_URL);
            const dataSudahBertelur = await response.json();
            
            // Loop data dari database, tandai ayam yang sudah bertelur hari ini
            dataSudahBertelur.forEach(id => {
                const btn = document.querySelector(`[data-id="${id}"]`);
                if (btn) {
                    btn.classList.add('bertelur');
                    btn.disabled = true; // Kunci tombol agar tidak dobel input
                    btn.innerText = "✓"; // Tanda sudah tercatat
                }
            });
        } catch (e) { 
            console.log("Belum ada data hari ini di database."); 
        }
    }

    // --- FITUR BARU: BATCH UPLOAD (Point 3) ---
    async function kirimData() {
        const btnSubmit = document.getElementById('submit');
        // Hanya ambil ayam yang dipilih SEKARANG (yang belum ada di database/disabled)
        const ayamBaruBertelur = document.querySelectorAll('.ayam.bertelur:not(:disabled)');
        
        if (ayamBaruBertelur.length === 0) {
            return alert("Pilih ayam yang bertelur dulu!");
        }

        btnSubmit.innerText = "Sedang Mengirim Batch...";
        btnSubmit.disabled = true;

        // Ambil semua ID ayam yang dipilih ke dalam satu Array
        const daftarID = Array.from(ayamBaruBertelur).map(a => a.getAttribute('data-id'));

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(daftarID),
                mode: 'no-cors' // Penting untuk Apps Script
            });

            alert(`Berhasil menyimpan ${daftarID.length} data ayam bertelur!`);
            location.reload(); // Refresh untuk melihat status terbaru
        } catch (error) {
            alert("Gagal mengirim data. Coba cek koneksi.");
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Simpan Data ke Google Sheets";
        }
    }

    // Jalankan saat halaman dibuka
    window.onload = async () => {
        renderKandang();
        await muatStatusHariIni(); // Langsung cek data dari database saat buka web
    };
        renderKandang();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</body>
</html>
